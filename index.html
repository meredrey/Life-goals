<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f4f6f2;
    --cream-dark: #e4ebe2;
    --warm-white: #f9faf8;
    --sand: #b8c9b0;
    --sand-light: #d8e4d4;
    --gold: #8a9e6a;
    --gold-light: #a0b87e;
    --gold-pale: #e6ede0;
    --brown: #4a6040;
    --brown-light: #6a8858;
    --text: #2a3424;
    --text-light: #4a6040;
    --text-muted: #7a9470;
    --green: #6a9e72;
    --green-light: #8ab890;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(40,70,30,0.08);
    --shadow-lg: 0 8px 40px rgba(40,70,30,0.12);
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Jost’, sans-serif;
background: var(–cream);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* HEADER */
.header {
background: linear-gradient(160deg, #2a3a24 0%, #3d5c34 50%, #5a7a4a 100%);
padding: 52px 24px 36px;
text-align: center;
position: relative;
overflow: hidden;
}
.header::before {
content: ‘’;
position: absolute;
inset: 0;
background: url(“data:image/svg+xml,%3Csvg width=‘60’ height=‘60’ viewBox=‘0 0 60 60’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=‘none’ fill-rule=‘evenodd’%3E%3Cg fill=’%238a9e6a’ fill-opacity=‘0.08’%3E%3Cpath d=‘M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z’/%3E%3C/g%3E%3C/g%3E%3C/svg%3E”);
opacity: 0.4;
}
.header-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 32px;
font-weight: 300;
color: var(–cream);
letter-spacing: 2px;
position: relative;
}
.header-title span {
color: var(–gold-light);
font-style: italic;
}
.header-sub {
font-size: 11px;
font-weight: 300;
color: var(–sand);
letter-spacing: 3px;
text-transform: uppercase;
margin-top: 8px;
position: relative;
}
.header-progress {
margin-top: 20px;
position: relative;
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
}
.progress-ring-wrap {
position: relative;
width: 64px;
height: 64px;
}
.progress-ring-wrap svg { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3; }
.progress-ring-fill { fill: none; stroke: #a0b87e; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
.progress-pct {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Cormorant Garamond’, serif;
font-size: 18px;
color: var(–cream);
}
.progress-label {
text-align: left;
color: var(–sand);
font-size: 12px;
line-height: 1.6;
}
.progress-label strong { color: var(–cream); font-weight: 400; font-size: 15px; display: block; }

/* NAV TABS */
.nav-tabs {
display: flex;
gap: 0;
background: var(–warm-white);
border-bottom: 1px solid var(–sand-light);
overflow-x: auto;
scrollbar-width: none;
position: sticky;
top: 0;
z-index: 100;
box-shadow: 0 2px 12px rgba(90,60,20,0.06);
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
flex: 0 0 auto;
padding: 14px 18px;
font-size: 11px;
font-weight: 400;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–text-muted);
cursor: pointer;
border-bottom: 2px solid transparent;
transition: all 0.2s;
white-space: nowrap;
background: none;
border-top: none;
border-left: none;
border-right: none;
font-family: ‘Jost’, sans-serif;
}
.nav-tab.active {
color: var(–gold);
border-bottom-color: var(–gold);
}
.nav-tab .tab-emoji { margin-right: 5px; }

/* CONTENT */
.content { padding: 0 0 100px; }
.area-section { display: none; animation: fadeUp 0.4s ease; }
.area-section.active { display: block; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

/* AREA HEADER */
.area-header {
padding: 28px 20px 20px;
background: var(–warm-white);
border-bottom: 1px solid var(–sand-light);
}
.area-name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 26px;
font-weight: 400;
color: var(–text);
}
.area-emoji { font-size: 22px; margin-right: 8px; }
.area-tagline {
font-size: 12px;
color: var(–text-muted);
margin-top: 4px;
font-style: italic;
font-family: ‘Cormorant Garamond’, serif;
font-size: 15px;
}
.area-progress-bar {
margin-top: 14px;
height: 4px;
background: var(–sand-light);
border-radius: 4px;
overflow: hidden;
}
.area-progress-fill {
height: 100%;
background: linear-gradient(90deg, #6a8858, #a0b87e);
border-radius: 4px;
transition: width 0.6s ease;
}
.area-progress-text {
font-size: 11px;
color: var(–text-muted);
margin-top: 6px;
text-align: right;
}

/* GOALS */
.goals-container { padding: 16px; }

.goal-card {
background: white;
border-radius: var(–radius);
margin-bottom: 16px;
box-shadow: var(–shadow);
overflow: hidden;
border: 1px solid var(–sand-light);
}
.goal-header {
padding: 18px 18px 14px;
cursor: pointer;
display: flex;
align-items: flex-start;
gap: 14px;
}
.goal-number {
width: 28px;
height: 28px;
border-radius: 50%;
background: var(–gold-pale);
color: var(–gold);
font-size: 12px;
font-weight: 500;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
margin-top: 2px;
font-family: ‘Cormorant Garamond’, serif;
font-size: 14px;
}
.goal-number.done {
background: var(–green);
color: white;
}
.goal-info { flex: 1; }
.goal-title {
font-size: 15px;
font-weight: 500;
color: var(–text);
line-height: 1.4;
}
.goal-meta {
font-size: 11px;
color: var(–text-muted);
margin-top: 4px;
display: flex;
align-items: center;
gap: 8px;
}
.goal-tag {
background: var(–gold-pale);
color: var(–brown-light);
padding: 2px 8px;
border-radius: 20px;
font-size: 10px;
letter-spacing: 0.5px;
}
.goal-chevron {
color: var(–sand);
font-size: 16px;
transition: transform 0.3s;
flex-shrink: 0;
margin-top: 4px;
}
.goal-card.open .goal-chevron { transform: rotate(180deg); }

/* MILESTONES */
.milestones {
display: none;
padding: 0 18px 18px;
border-top: 1px solid var(–cream-dark);
}
.goal-card.open .milestones { display: block; }
.milestones-title {
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-muted);
margin: 14px 0 12px;
}

.milestone {
display: flex;
align-items: flex-start;
gap: 12px;
padding: 10px 0;
border-bottom: 1px solid var(–cream-dark);
cursor: pointer;
}
.milestone:last-child { border-bottom: none; }
.milestone-check {
width: 22px;
height: 22px;
border-radius: 50%;
border: 1.5px solid var(–sand);
flex-shrink: 0;
margin-top: 1px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.25s;
background: white;
}
.milestone.checked .milestone-check {
background: var(–green);
border-color: var(–green);
}
.milestone.checked .milestone-check::after {
content: ‘✓’;
color: white;
font-size: 12px;
font-weight: 500;
}
.milestone-text {
font-size: 13.5px;
color: var(–text);
line-height: 1.5;
flex: 1;
padding-top: 1px;
}
.milestone.checked .milestone-text {
color: var(–text-muted);
text-decoration: line-through;
text-decoration-color: var(–sand);
}
.milestone-date {
font-size: 10px;
color: var(–text-muted);
white-space: nowrap;
margin-top: 3px;
}

/* GOAL COMPLETE BANNER */
.goal-complete {
background: linear-gradient(135deg, #5a7a4a, #8ab890);
color: white;
padding: 10px 16px;
font-size: 12px;
text-align: center;
letter-spacing: 1px;
font-weight: 400;
display: none;
}
.goal-card.goal-done .goal-complete { display: block; }
.goal-card.goal-done .goal-number { background: var(–green); color: white; }

/* BOTTOM SUMMARY */
.summary-bar {
position: fixed;
bottom: 0;
left: 0;
right: 0;
background: white;
border-top: 1px solid var(–sand-light);
padding: 12px 20px;
padding-bottom: max(12px, env(safe-area-inset-bottom));
display: flex;
align-items: center;
justify-content: space-between;
box-shadow: 0 -4px 20px rgba(40,70,30,0.08);
z-index: 200;
}
.summary-stat { text-align: center; }
.summary-num {
font-family: ‘Cormorant Garamond’, serif;
font-size: 22px;
color: var(–gold);
line-height: 1;
}
.summary-lbl {
font-size: 9px;
color: var(–text-muted);
letter-spacing: 1.5px;
text-transform: uppercase;
margin-top: 2px;
}
.summary-divider { width: 1px; height: 32px; background: var(–sand-light); }

/* TOAST */
.toast {
position: fixed;
top: 70px;
left: 50%;
transform: translateX(-50%) translateY(-20px);
background: var(–text);
color: var(–cream);
padding: 10px 20px;
border-radius: 30px;
font-size: 13px;
opacity: 0;
transition: all 0.3s;
z-index: 999;
white-space: nowrap;
pointer-events: none;
}
.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

/* NOTE SECTION */
.note-section {
margin: 0 16px 16px;
background: var(–gold-pale);
border-radius: 12px;
padding: 14px 16px;
border-left: 3px solid #8a9e6a;
}
.note-label {
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–gold);
margin-bottom: 6px;
}
.note-text {
font-family: ‘Cormorant Garamond’, serif;
font-size: 15px;
color: var(–brown);
line-height: 1.6;
font-style: italic;
}
</style>

</head>

// Storage
const STORAGE_KEY = 'mata_life_goals_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

function toggleMilestone(mid) {
  state[mid] = !state[mid];
  saveState(state);
  renderAll();
  if (state[mid]) showToast('✓ Krok ukończony!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function countMilestones(area) {
  let total = 0, done = 0;
  area.goals.forEach(g => {
    g.milestones.forEach(m => {
      total++;
      if (state[m.id]) done++;
    });
  });
  return { total, done };
}

function countAll() {
  let total = 0, done = 0;
  DATA.forEach(area => {
    const c = countMilestones(area);
    total += c.total;
    done += c.done;
  });
  return { total, done };
}

let activeArea = DATA[0].id;
let openGoals = {};

function renderTabs() {
  const nav = document.getElementById('navTabs');
  nav.innerHTML = DATA.map(a => `
    <button class="nav-tab ${a.id === activeArea ? 'active' : ''}" onclick="switchArea('${a.id}')">
      <span class="tab-emoji">${a.emoji}</span>${a.name.split(' ')[0]}
    </button>
  `).join('');
}

function switchArea(id) {
  activeArea = id;
  renderAll();
  document.querySelector('.content').scrollTop = 0;
}

function toggleGoal(gid) {
  openGoals[gid] = !openGoals[gid];
  renderAll();
}

function renderContent() {
  const content = document.getElementById('content');
  content.innerHTML = DATA.map(area => {
    const { total, done } = countMilestones(area);
    const pct = total ? Math.round(done / total * 100) : 0;
    const isActive = area.id === activeArea;

    const goalsHTML = area.goals.map(goal => {
      const gDone = goal.milestones.filter(m => state[m.id]).length;
      const gTotal = goal.milestones.length;
      const allDone = gDone === gTotal;
      const isOpen = openGoals[goal.id];

      const milestonesHTML = goal.milestones.map(m => `
        <div class="milestone ${state[m.id] ? 'checked' : ''}" onclick="toggleMilestone('${m.id}')">
          <div class="milestone-check"></div>
          <div class="milestone-text">${m.text}</div>
        </div>
      `).join('');

      return `
        <div class="goal-card ${isOpen ? 'open' : ''} ${allDone ? 'goal-done' : ''}">
          <div class="goal-complete">✨ Cel osiągnięty!</div>
          <div class="goal-header" onclick="toggleGoal('${goal.id}')">
            <div class="goal-number ${allDone ? 'done' : ''}">${allDone ? '✓' : gDone + '/' + gTotal}</div>
            <div class="goal-info">
              <div class="goal-title">${goal.title}</div>
              <div class="goal-meta">
                <span class="goal-tag">${goal.tag}</span>
                <span>${gDone} z ${gTotal} kroków</span>
              </div>
            </div>
            <div class="goal-chevron">▾</div>
          </div>
          <div class="milestones">
            <div class="milestones-title">Kroki do celu</div>
            ${milestonesHTML}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="area-section ${isActive ? 'active' : ''}" id="area-${area.id}">
        <div class="area-header">
          <div class="area-name"><span class="area-emoji">${area.emoji}</span>${area.name}</div>
          <div class="area-tagline">${area.tagline}</div>
          <div class="area-progress-bar">
            <div class="area-progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="area-progress-text">${done} / ${total} kroków · ${pct}%</div>
        </div>
        ${area.note ? `<div class="note-section"><div class="note-label">Przypomnienie</div><div class="note-text">${area.note}</div></div>` : ''}
        <div class="goals-container">${goalsHTML}</div>
      </div>
    `;
  }).join('');
}

function renderStats() {
  const { total, done } = countAll();
  const pct = total ? Math.round(done / total * 100) : 0;
  const circ = 175.9;
  const offset = circ - (circ * pct / 100);

  document.getElementById('mainRing').style.strokeDashoffset = offset;
  document.getElementById('mainPct').textContent = pct + '%';
  document.getElementById('doneCount').textContent = `${done} / ${total}`;

  const totalGoals = DATA.reduce((s, a) => s + a.goals.length, 0);
  document.getElementById('sumAreas').textContent = DATA.length;
  document.getElementById('sumGoals').textContent = totalGoals;
  document.getElementById('sumDone').textContent = done;
  document.getElementById('sumLeft').textContent = total - done;
}

function renderAll() {
  renderTabs();
  renderContent();
  renderStats();
}

renderAll();
</script>
