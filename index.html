        {t:'Umówić pierwszą konsultację', f:'jednorazowo'},
        {t:'Pójść na pierwszą sesję', f:'jednorazowo'},
        {t:'Ustalić regularny rytm sesji', f:'jednorazowo'},
      ]}
    ]},
  { id:'dom', emoji:'🏡', name:'Dom & Przestrzeń', tagline:'Dom który czujesz zanim przekroczysz próg',
    note:'Ciepłe drewno, kremowe tekstury, złote detale — masz już wizję. Teraz ją zrealizować.',
    goals:[
      { id:'d1', title:'Sprzedać obecny dom i kupić dom marzeń', tag:'Transakcja', ms:[
        {t:'Dom wystawiony na sprzedaż z agentem ✓', f:'jednorazowo'},
        {t:'Pierwsze oględziny z kupującymi', f:'jednorazowo'},
        {t:'Oferta kupna przyjęta — umowa podpisana 🎉', f:'jednorazowo'},
        {t:'Zdefiniować must-have nowego domu (lista kryteriów)', f:'jednorazowo'},
        {t:'Zobaczyć min. 5 nieruchomości', f:'tygodniowo'},
        {t:'Złożyć ofertę na wymarzony dom', f:'jednorazowo'},
        {t:'Klucze w ręku — nowy dom nasz 🔑', f:'jednorazowo'},
      ]},
      { id:'d2', title:'Urządzić dom zgodnie z wizją — ciepło, elegancja, rodzina', tag:'Aranżacja', ms:[
        {t:'Stworzyć mood board dla każdego pomieszczenia', f:'jednorazowo'},
        {t:'Ustalić budżet i priorytety pomieszczeń', f:'jednorazowo'},
        {t:'Urządzić salon — przestrzeń wspólna gotowa', f:'jednorazowo'},
        {t:'Urządzić sypialnię — spokój i komfort', f:'jednorazowo'},
        {t:'Urządzić pokój dziewczynek — ich magiczna przestrzeń', f:'jednorazowo'},
        {t:'Pierwszy wieczór z gośćmi w nowym domu 🍷', f:'jednorazowo'},
      ]}
    ]}
];

const SK = 'mata_lg_v4';
let S = (() => { try { return JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) { return {}; } })();
const save = () => { try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e) {} };
let activePage = 'dashboard';
let openGoals = {};

function getNextStep(area) {
  for (const g of area.goals)
    for (let i = 0; i < g.ms.length; i++)
      if (!S[g.id+'_'+i]) return { gid:g.id, idx:i, ms:g.ms[i], goalTitle:g.title };
  return null;
}

function msDone(gid, idx) {
  const k = gid+'_'+idx; S[k] = !S[k]; save(); render();
  if (S[k]) showToast('✓ Krok ukończony!');
}
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
function toggleGoal(id) { openGoals[id] = !openGoals[id]; render(); }
function switchPage(id) { activePage = id; render(); window.scrollTo(0,0); }

function countArea(area) {
  let total=0, done=0;
  area.goals.forEach(g => g.ms.forEach((_,i) => { total++; if(S[g.id+'_'+i]) done++; }));
  return {total,done};
}
function countAll() {
  let total=0, done=0;
  DATA.forEach(a => { const c=countArea(a); total+=c.total; done+=c.done; });
  return {total,done};
}

function freqBadge(f) {
  return `<span class="freq freq-${f}">${FREQ_LABELS[f]}</span>`;
}

function renderDashboard() {
  const pAreas = DATA.filter(a => PRIORITY_IDS.includes(a.id));
  const rAreas = DATA.filter(a => !PRIORITY_IDS.includes(a.id));

  function cardHTML(area, isPriority) {
    const next = getNextStep(area);
    if (!next) return `<div class="dash-all-done ${isPriority?'priority-card':'radar-card'}">
      <div class="dash-all-done-text">${area.emoji} ${area.name} — wszystkie kroki ukończone! 🎉</div></div>`;
    const checked = S[next.gid+'_'+next.idx];
    return `<div class="dash-card ${isPriority?'priority-card':'radar-card'}">
      <div class="dash-card-left">
        <div class="dash-card-area">${isPriority?'<span class="priority-dot"></span>':''}${area.emoji} ${area.name}</div>
        <div class="dash-card-step">${next.ms.t}</div>
        <div class="dash-card-meta">${freqBadge(next.ms.f)}<span class="dash-card-goal">${next.goalTitle}</span></div>
      </div>
      <div class="dash-card-right" onclick="msDone('${next.gid}',${next.idx})">
        <div class="dash-check ${checked?'done':''}"></div>
      </div>
    </div>`;
  }

  return `<div class="dash">
    <div class="dash-section-title">🎯 Priorytety teraz</div>
    ${pAreas.map(a => cardHTML(a,true)).join('')}
    <div class="dash-section-title" style="margin-top:18px">📋 Na radarze</div>
    ${rAreas.map(a => cardHTML(a,false)).join('')}
  </div>`;
}

function render() {
  const pages = [{id:'dashboard', emoji:'🏠', name:'Dziś'}, ...DATA];
  document.getElementById('nav').innerHTML = pages.map((p,i) => {
    const isPriority = p.id !== 'dashboard' && PRIORITY_IDS.includes(p.id);
    const label = p.id === 'dashboard' ? 'Dziś' : p.name.split(' ')[0];
    const divider = i === 5 ? '<div class="nav-divider"></div>' : '';
    return divider + `<button class="nav-btn ${isPriority?'priority':''} ${p.id===activePage?'active':''}" onclick="switchPage('${p.id}')">${p.emoji} ${label}</button>`;
  }).join('');

  let html = `<div class="page ${activePage==='dashboard'?'active':''}" id="page-dashboard">${renderDashboard()}</div>`;

  DATA.forEach(area => {
    const {total,done} = countArea(area);
    const pct = total ? Math.round(done/total*100) : 0;
    const goalsHTML = area.goals.map(g => {
      const gdone = g.ms.filter((_,i) => S[g.id+'_'+i]).length;
      const allDone = gdone === g.ms.length;
      const isOpen = openGoals[g.id];
      const msHTML = g.ms.map((m,i) => {
        const checked = S[g.id+'_'+i];
        return `<div class="ms ${checked?'done':''}" onclick="msDone('${g.id}',${i})">
          <div class="ms-check"></div>
          <div class="ms-body">
            <div class="ms-text">${m.t}</div>
            <div class="ms-freq">${freqBadge(m.f)}</div>
          </div>
        </div>`;
      }).join('');
      return `<div class="goal ${isOpen?'open':''} ${allDone?'all-done':''}">
        <div class="goal-done-banner">✨ Cel osiągnięty!</div>
        <div class="goal-head" onclick="toggleGoal('${g.id}')">
          <div class="goal-badge ${allDone?'done':''}">${allDone?'✓':gdone+'/'+g.ms.length}</div>
          <div class="goal-info">
            <div class="goal-title-text">${g.title}</div>
            <div class="goal-meta"><span class="goal-tag">${g.tag}</span><span class="goal-count">${gdone} z ${g.ms.length} kroków</span></div>
          </div>
          <div class="goal-arrow">▾</div>
        </div>
        <div class="milestones"><div class="milestones-label">Kroki do celu</div>${msHTML}</div>
      </div>`;
    }).join('');
    html += `<div class="page ${area.id===activePage?'active':''}" id="page-${area.id}">
      <div class="area-top">
        <div class="area-title">${area.emoji} ${area.name}</div>
        <div class="area-tagline">${area.tagline}</div>
        <div class="area-bar"><div class="area-bar-fill" style="width:${pct}%"></div></div>
        <div class="area-bar-text">${done} / ${total} kroków · ${pct}%</div>
      </div>
      ${area.note?`<div class="note"><div class="note-label">Przypomnienie</div><div class="note-text">${area.note}</div></div>`:''}
      <div class="goals">${goalsHTML}</div>
    </div>`;
  });

  document.getElementById('main').innerHTML = html;
  const {total,done} = countAll();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('mainPct').textContent = pct+'%';
  document.getElementById('mainCount').textContent = done+' / '+total;
  document.getElementById('globalBar').style.width = pct+'%';
  document.getElementById('bs2').textContent = DATA.reduce((s,a)=>s+a.goals.length,0);
  document.getElementById('bs3').textContent = done;
  document.getElementById('bs4').textContent = total-done;
}

render();
</script>

</body>
</html>
